[build]
  publish = "."

[[redirects]]
  from = "/overview"
  to   = "/index.html"
  status = 301

[[redirects]]
  from = "/overview.html"
  to   = "/index.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
